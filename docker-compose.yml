version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  booking-service:
    build:
      context: ./services/booking-service
    container_name: booking-service
    ports:
      - "3002:3002"
    env_file:
      - ./services/booking-service/.env
    depends_on:
      - mongodb

volumes:
  mongo-data: